name: Deploy to Hostinger

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Backend Dependencies
        run: |
          cd backend
          composer config platform.php 8.2.30
          composer install --no-dev --optimize-autoloader
          cd ..

      - name: Prepare Deployment Structure
        run: |
          mkdir -p deploy/api
          mkdir -p deploy/api_backend
          cp -r frontend/dist/* deploy/
          cp -r backend/* deploy/api_backend/
          echo "<?php echo 'DIR: ' . __DIR__; ?>" > deploy/debug.php
          
           # Root .htaccess (Isolamento total e prioridade de index)
          cat <<EOT > deploy/.htaccess
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteBase /
              
              # Prioridade para o index.html gerado pelo React
              DirectoryIndex index.html index.php
              
              # Impede que o .htaccess da pasta pai (WordPress) interfira aqui
              RewriteOptions None
              
              RewriteRule ^api(/.*)?$ - [L]
              RewriteRule ^index\.html$ - [L]
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteRule . /index.html [L]
          </IfModule>

          # Security for .env
          <Files .env>
              Order allow,deny
              Deny from all
          </Files>
          EOT
          
          # Ponte index.php para garantir que o servidor LiteSpeed abra o diretório
          echo "<?php include 'index.html'; ?>" > deploy/index.php
          
          # API inner .htaccess
          cat <<EOT > deploy/api/.htaccess
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteRule ^(.*)$ ../api_backend/public/\$1 [L]
          </IfModule>
          EOT

      - name: Create Production .env
        run: |
          cat <<EOT > deploy/api_backend/.env
          APP_NAME=CPGestao
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY || 'base64:XG8pY6XpD/v77y5S6L7U5P4R3G6B1N7=' }}
          APP_DEBUG=false
          APP_URL=https://cpgestaonew.creativeprintjp.com

          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          CACHE_DRIVER=file
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          
          CORS_ALLOWED_ORIGINS=https://cpgestaonew.creativeprintjp.com
          EOT

      - name: Pre-Deploy SSH (Cleanup and Dir Creation)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 65002 }}
          script: |
            # Garante que a pasta do subdomínio exista e esteja vazia
            mkdir -p public_html/cpgestaonew
            cd public_html/cpgestaonew
            # Remove arquivos antigos para evitar conflitos (EXCETO a própria pasta)
            rm -rf * .htaccess .env || true

      - name: Deploy to Hostinger via SCP (Password Auth)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 65002 }}
          source: "deploy/**"
          target: "public_html/cpgestaonew"
          strip_components: 1
          overwrite: true

      - name: Finalize Backend (Migrations & Symlinks)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 65002 }}
          script: |
            echo "--- RASTREAMENTO DE CAMINHO REAL ---"
            # Tenta localizar o arquivo default.php em toda a conta do usuário
            # Isso nos dirá exatamente onde a Hostinger criou o subdomínio
            DISCOVERED_ROOT=$(find ~ -name "default.php" 2>/dev/null | head -n 1 | xargs dirname)
            
            echo "Caminho Absoluto descoberto: $DISCOVERED_ROOT"
            
            if [ -z "$DISCOVERED_ROOT" ]; then
              echo "Aviso: default.php não encontrado. Usando caminho padrão."
              TARGET_DIR="public_html/cpgestaonew"
            else
              TARGET_DIR="$DISCOVERED_ROOT"
              echo "Ajustando alvo para: $TARGET_DIR"
            fi

            # Garante que a pasta existe
            mkdir -p "$TARGET_DIR"
            
            # Se os arquivos foram parar em public_html/cpgestaonew mas a raiz era outra, movemos
            if [ "$TARGET_DIR" != "public_html/cpgestaonew" ] && [ -d "public_html/cpgestaonew" ]; then
              echo "Movendo arquivos do cpgestaonew para a raiz real..."
              cp -r public_html/cpgestaonew/* "$TARGET_DIR/"
            fi

            # Entra na pasta alvo e limpa
            cd "$TARGET_DIR"
            chmod -R 755 . || true
            rm -f default.php index.php || true
            
            # Ponte index.php
            echo "<?php include 'index.html'; ?>" > index.php
            
            # Backend Laravel
            cd api_backend
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link || true
            
            # Limpeza final de vazamentos na public_html (WordPress raiz)
            rm -f ~/public_html/index.html ~/public_html/.htaccess ~/public_html/debug.php || true
            rm -rf ~/public_html/api ~/public_html/api_backend || true
