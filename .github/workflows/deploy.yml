name: Deploy to Hostinger

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Backend Dependencies
        run: |
          cd backend
          composer config platform.php 8.2.30
          composer install --no-dev --optimize-autoloader
          cd ..

      - name: Prepare Deployment Structure
        run: |
          mkdir -p deploy/api
          mkdir -p deploy/api_backend
          cp -r frontend/dist/* deploy/
          cp -r backend/* deploy/api_backend/
          
          # Root .htaccess (Dedicated Subdomain Folder)
          cat <<EOT > deploy/.htaccess
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteBase /
              RewriteRule ^api(/.*)?$ - [L]
              RewriteRule ^index\.html$ - [L]
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteRule . /index.html [L]
          </IfModule>

          # PHP Config for Hostinger
          php_value upload_max_filesize 64M
          php_value post_max_size 64M
          EOT
          
          # API inner .htaccess
          cat <<EOT > deploy/api/.htaccess
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteRule ^(.*)$ ../api_backend/public/\$1 [L]
          </IfModule>
          EOT

      - name: Create Production .env
        run: |
          cat <<EOT > deploy/api_backend/.env
          APP_NAME=CPGestao
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY || 'base64:XG8pY6XpD/v77y5S6L7U5P4R3G6B1N7=' }}
          APP_DEBUG=false
          APP_URL=https://cpgestaoefidelidade.creativeprintjp.com

          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          CACHE_DRIVER=file
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          
          CORS_ALLOWED_ORIGINS=https://cpgestaoefidelidade.creativeprintjp.com
          EOT

      - name: Deploy to Hostinger via SCP (Password Auth)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 65002 }}
          source: "deploy/*"
          target: "public_html/cpgestaoefidelidade"
          strip_components: 1

      - name: Finalize Backend (Migrations & Symlinks)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 65002 }}
          script: |
            cd public_html/cpgestaoefidelidade/api_backend
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link || true
