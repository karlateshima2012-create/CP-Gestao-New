name: Deploy to Hostinger

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Backend Dependencies
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader
          cd ..

      - name: Prepare Deployment Structure
        run: |
          mkdir -p deploy/api
          mkdir -p deploy/api_backend
          cp -r frontend/dist/* deploy/
          cp -r backend/* deploy/api_backend/
          
          # Root .htaccess
          cat <<EOT > deploy/.htaccess
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteRule ^api(/.*)?$ - [L]
              RewriteBase /
              RewriteRule ^index\.html$ - [L]
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteRule . /index.html [L]
          </IfModule>
          EOT
          
          # API .htaccess
          cat <<EOT > deploy/api/.htaccess
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteRule ^(.*)$ ../api_backend/public/\$1 [L]
          </IfModule>
          EOT

      - name: Deploy to Hostinger via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "deploy/*"
          target: "public_html/cpgestaoefidelidade"
          strip_components: 1

      - name: Finalize Backend (Migrations & Optimization)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd public_html/cpgestaoefidelidade/api_backend
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
