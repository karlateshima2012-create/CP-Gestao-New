name: Deploy to Hostinger

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          VITE_API_URL=https://cpgestaonew.creativeprintjp.com/api npm run build
          cd ..

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Prepare Package
        run: |
          rm -rf deploy
          mkdir -p deploy/api
          mkdir -p deploy/api_backend
          
          # Copia Frontend
          cp -r frontend/dist/* deploy/
          
          # Copia Backend
          cp -r backend/* deploy/api_backend/
          
          # Root .htaccess (SPA + API Bypass)
          cat <<EOT > deploy/.htaccess
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteBase /
              
              # Bypass API
              RewriteRule ^api(/.*)?$ - [L]
              
              # SPA Routing
              RewriteRule ^index\.html$ - [L]
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteRule . /index.html [L]
          </IfModule>
          EOT
          
          # API Bridge .htaccess
          cat <<EOT > deploy/api/.htaccess
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteRule ^(.*)$ ../api_backend/public/\$1 [L]
          </IfModule>
          EOT
          
          # Create .env
          cat <<EOT > deploy/api_backend/.env
          APP_NAME="CP Gestão"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY || 'base64:XG8pY6XpD/v77y5S6L7U5P4R3G6B1N7=' }}
          APP_DEBUG=false
          APP_URL=https://cpgestaonew.creativeprintjp.com
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          CACHE_DRIVER=file
          FILESYSTEM_DISK=local
          SESSION_DRIVER=file
          CORS_ALLOWED_ORIGINS=https://cpgestaonew.creativeprintjp.com
          EOT

      - name: Clean and Deplay (Resilient)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 65002 }}
          timeout: 120s
          script: |
            mkdir -p /home/u176367625/domains/creativeprintjp.com/public_html/cpgestaonew
            rm -rf /home/u176367625/domains/creativeprintjp.com/public_html/cpgestaonew/*

      - name: Upload (Resilient)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 65002 }}
          timeout: 120s
          source: "deploy/**"
          target: "/home/u176367625/domains/creativeprintjp.com/public_html/cpgestaonew"
          strip_components: 1

      - name: Post-Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 65002 }}
          timeout: 120s
          script: |
            cd /home/u176367625/domains/creativeprintjp.com/public_html/cpgestaonew/api_backend
            composer install --no-dev --optimize-autoloader
            php artisan config:clear
            php artisan cache:clear
            php artisan db:seed --class=SpecificTestUsersSeeder --force
            php artisan config:cache
            php artisan storage:link || true
            chmod -R 775 storage bootstrap/cache
            echo "Sistema Restaurado!"
