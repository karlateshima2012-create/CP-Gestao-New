name: Deploy to Hostinger

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, zip

      - name: Install Backend Dependencies
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader
          cd ..

      - name: Prepare Deployment Structure
        run: |
          # Limpeza e criação da estrutura
          rm -rf deploy
          mkdir -p deploy/api
          mkdir -p deploy/api_backend
          
          # Copiar Frontend (Raiz)
          cp -r frontend/dist/* deploy/
          
          # Copiar Backend
          cp -r backend/* deploy/api_backend/
          
          # Root .htaccess (SPA Routing + API bypass)
          cat <<EOT > deploy/.htaccess
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteBase /
              DirectoryIndex index.html index.php
              
              # Bypass API requests
              RewriteRule ^api(/.*)?$ - [L]
              
              # SPA Routing
              RewriteRule ^index\.html$ - [L]
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteRule . /index.html [L]
          </IfModule>
          
          # Securing .env files
          <Files .env>
              Order allow,deny
              Deny from all
          </Files>
          EOT
          
          # API inner .htaccess (Bridge to api_backend/public)
          cat <<EOT > deploy/api/.htaccess
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteRule ^(.*)$ ../api_backend/public/\$1 [L]
          </IfModule>
          EOT
          
          # Security Bridge index.php
          echo "<?php include 'index.html'; ?>" > deploy/index.php

      - name: Create Production .env
        run: |
          cat <<EOT > deploy/api_backend/.env
          APP_NAME="CP Gestão"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY || 'base64:XG8pY6XpD/v77y5S6L7U5P4R3G6B1N7=' }}
          APP_DEBUG=false
          APP_URL=https://cpgestaonew.creativeprintjp.com
          
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=u176367625_cpgestaonew
          DB_USERNAME=u176367625_cpgestaonew
          DB_PASSWORD=G7mQ9zP4kL2nX8vR
          
          CACHE_DRIVER=file
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          
          CORS_ALLOWED_ORIGINS=https://cpgestaonew.creativeprintjp.com
          EOT

      - name: Pre-Deploy Cleanup (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 65002 }}
          script: |
            TARGET="domains/creativeprintjp.com/public_html/cpgestaonew"
            mkdir -p "$TARGET"
            cd "$TARGET"
            # Remove arquivos antigos exceto a pasta de logs se existir
            find . -maxdepth 1 ! -name 'storage' ! -name '.' -exec rm -rf {} + || true

      - name: Deploy to Hostinger (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 65002 }}
          source: "deploy/**"
          target: "domains/creativeprintjp.com/public_html/cpgestaonew"
          strip_components: 1
          overwrite: true

      - name: Post-Deploy Finalization (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 65002 }}
          script: |
            CD_PATH="domains/creativeprintjp.com/public_html/cpgestaonew/api_backend"
            cd "$CD_PATH"
            
            # Permissões
            chmod -R 755 .
            chmod -R 775 storage bootstrap/cache
            
            # Laravel optimization
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link || true
            
            echo "Deploy concluído com sucesso em $CD_PATH"
