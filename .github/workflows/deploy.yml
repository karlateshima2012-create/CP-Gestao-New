name: Deploy to Hostinger

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Prepare Deployment Package
        run: |
          rm -rf deploy
          mkdir -p deploy/api_backend
          # Move o build do Vite (dist) para a raiz do pacote
          cp -r frontend/dist/* deploy/
          # Move o backend completo
          cp -r backend/* deploy/api_backend/

      - name: Create Production .env
        run: |
          cat <<EOT > deploy/api_backend/.env
          APP_NAME="CP Gestão"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY || 'base64:XG8pY6XpD/v77y5S6L7U5P4R3G6B1N7=' }}
          APP_DEBUG=false
          APP_URL=https://cpgestaonew.creativeprintjp.com
          
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          
          CACHE_DRIVER=file
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          
          CORS_ALLOWED_ORIGINS=https://cpgestaonew.creativeprintjp.com
          EOT

      - name: Pre-Deploy Cleanup (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 65002 }}
          script: |
            mkdir -p /home/u176367625/domains/creativeprintjp.com/public_html/cpgestaonew
            rm -rf /home/u176367625/domains/creativeprintjp.com/public_html/cpgestaonew/*

      - name: Upload Build Files (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 65002 }}
          source: "deploy/**"
          target: "/home/u176367625/domains/creativeprintjp.com/public_html/cpgestaonew"
          strip_components: 1
          overwrite: true

      - name: Post-Deploy Finalization (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 65002 }}
          script: |
            cd /home/u176367625/domains/creativeprintjp.com/public_html/cpgestaonew/api_backend
            # Limpeza rápida de dependências de prod
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force || true
            php artisan config:clear
            php artisan db:seed --class=SpecificTestUsersSeeder --force
            php artisan config:cache
            php artisan route:cache || true
            php artisan view:cache
            php artisan storage:link || true
            echo "Deploy finalizado com sucesso no IN-790!"
