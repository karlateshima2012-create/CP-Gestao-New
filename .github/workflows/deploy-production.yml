name: Deploy CP Gestão v2 - Produção

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy Produção v2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          VITE_API_URL=https://cpgestao.creativeprintjp.com/api npm run build
          cd ..

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Prepare Package
        run: |
          rm -rf deploy
          mkdir -p deploy/api
          mkdir -p deploy/api_backend

          cp -r frontend/dist/* deploy/
          cp -r backend/* deploy/api_backend/

          # Root .htaccess
          printf '<IfModule mod_rewrite.c>\n    RewriteEngine On\n    RewriteBase /\n    RewriteRule ^api(/.*)?$ - [L]\n    RewriteRule ^index\\.html$ - [L]\n    RewriteCond %%{REQUEST_FILENAME} !-f\n    RewriteCond %%{REQUEST_FILENAME} !-d\n    RewriteRule . /index.html [L]\n</IfModule>\n' > deploy/.htaccess

          # API Bridge .htaccess
          printf '<IfModule mod_rewrite.c>\n    RewriteEngine On\n    RewriteRule ^(.*)$ ../api_backend/public/$1 [L]\n</IfModule>\n' > deploy/api/.htaccess

          # Gera .env base — APP_KEY e TELEGRAM serão restaurados do servidor
          ENV_FILE="deploy/api_backend/.env"
          echo 'APP_NAME="CP Gestao"'                                          > $ENV_FILE
          echo "APP_ENV=production"                                            >> $ENV_FILE
          echo "APP_KEY=PLACEHOLDER_KEY"                                       >> $ENV_FILE
          echo "APP_DEBUG=false"                                               >> $ENV_FILE
          echo "APP_URL=https://cpgestao.creativeprintjp.com"                 >> $ENV_FILE
          echo "DB_CONNECTION=mysql"                                           >> $ENV_FILE
          echo "DB_HOST=127.0.0.1"                                            >> $ENV_FILE
          echo "DB_PORT=3306"                                                  >> $ENV_FILE
          echo "DB_DATABASE=${{ secrets.DB_DATABASE }}"                       >> $ENV_FILE
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}"                       >> $ENV_FILE
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"                       >> $ENV_FILE
          echo "CACHE_DRIVER=file"                                             >> $ENV_FILE
          echo "FILESYSTEM_DISK=local"                                         >> $ENV_FILE
          echo "SESSION_DRIVER=file"                                           >> $ENV_FILE
          echo "QUEUE_CONNECTION=sync"                                         >> $ENV_FILE
          echo "CORS_ALLOWED_ORIGINS=https://cpgestao.creativeprintjp.com"    >> $ENV_FILE
          echo "SANCTUM_STATEFUL_DOMAINS=cpgestao.creativeprintjp.com"        >> $ENV_FILE
          echo "SESSION_DOMAIN=.creativeprintjp.com"                          >> $ENV_FILE
          echo "MAIL_MAILER=smtp"                                              >> $ENV_FILE
          echo "MAIL_HOST=${{ secrets.MAIL_HOST }}"                           >> $ENV_FILE
          echo "MAIL_PORT=${{ secrets.MAIL_PORT }}"                           >> $ENV_FILE
          echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}"                   >> $ENV_FILE
          echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}"                   >> $ENV_FILE
          echo "MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}"               >> $ENV_FILE
          echo "MAIL_FROM_ADDRESS=${{ secrets.MAIL_USERNAME }}"               >> $ENV_FILE
          echo 'MAIL_FROM_NAME="CP Gestao"'                                   >> $ENV_FILE
          echo "TELEGRAM_BOT_TOKEN=PLACEHOLDER_TELEGRAM"                      >> $ENV_FILE

      - name: SSH Pre-Deploy (Backup + Salvar Chaves)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            PROD_ENV="/home/u176367625/domains/creativeprintjp.com/public_html/cpgestao/api_backend/.env"
            mkdir -p ~/backups_v2_migration

            # Backup do banco de dados
            mysqldump -h 127.0.0.1 -u ${{ secrets.DB_USERNAME }} -p'${{ secrets.DB_PASSWORD }}' ${{ secrets.DB_DATABASE }} > ~/backups_v2_migration/backup_$(date +%F_%H-%M-%S).sql && echo "Backup OK" || echo "Aviso: Backup falhou"

            # Salvar APP_KEY e TELEGRAM do .env atual
            if [ -f "$PROD_ENV" ]; then
              grep "^APP_KEY=" "$PROD_ENV" > ~/backups_v2_migration/saved_keys.txt || true
              grep "^TELEGRAM_BOT_TOKEN=" "$PROD_ENV" >> ~/backups_v2_migration/saved_keys.txt || true
              echo "Chaves salvas."
            fi

            # Modo de manutencao
            cd /home/u176367625/domains/creativeprintjp.com/public_html/cpgestao/api_backend && php artisan down || echo "Pasta nao existe ainda"

      - name: Upload Files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 600s
          source: "deploy/**"
          target: "/home/u176367625/domains/creativeprintjp.com/public_html/cpgestao"
          overwrite: true
          strip_components: 1

      - name: Post-Deploy (Restaurar Chaves + Migrar + Otimizar)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 600s
          script: |
            PROD_DIR="/home/u176367625/domains/creativeprintjp.com/public_html/cpgestao/api_backend"
            cd "$PROD_DIR"

            # 1. Restaurar APP_KEY do servidor (nunca invalida sessoes existentes)
            SAVED_KEY=$(grep "^APP_KEY=" ~/backups_v2_migration/saved_keys.txt 2>/dev/null | head -1 | cut -d= -f2-)
            if [ -n "$SAVED_KEY" ]; then
              sed -i "s|APP_KEY=PLACEHOLDER_KEY|APP_KEY=$SAVED_KEY|" .env
              echo "APP_KEY restaurada."
            else
              php artisan key:generate --force
              echo "APP_KEY gerada (primeiro deploy)."
            fi

            # 2. Restaurar TELEGRAM_BOT_TOKEN
            SAVED_TG=$(grep "^TELEGRAM_BOT_TOKEN=" ~/backups_v2_migration/saved_keys.txt 2>/dev/null | head -1 | cut -d= -f2-)
            if [ -n "$SAVED_TG" ]; then
              sed -i "s|TELEGRAM_BOT_TOKEN=PLACEHOLDER_TELEGRAM|TELEGRAM_BOT_TOKEN=$SAVED_TG|" .env
              echo "Token Telegram restaurado."
            fi

            # 3. Dependencias
            composer install --no-dev --optimize-autoloader

            # 4. Migracoes
            php artisan migrate --force

            # 5. Seed Admin Master
            php artisan db:seed --class=SpecificTestUsersSeeder --force

            # 6. Cache e otimizacao
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link || true
            chmod -R 775 storage bootstrap/cache

            # 7. Voltar ao ar
            php artisan up
            echo "Deploy v2 Concluido!"
